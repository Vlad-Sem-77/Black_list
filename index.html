<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Мини-приложения</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --paper:#FBF9F3; --desk:#E4E0D6; --graphite:#2B2B2B; --muted:#8b8578;
    --ink-blue:#28437A; --ink-red:#A5273A;
    --font-hand:'Kalam','Segoe Print','Bradley Hand','Comic Sans MS',cursive;
    --font-ui:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--desk);font-family:var(--font-ui);
      color:var(--graphite);overscroll-behavior:none;}
  #app{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px;gap:18px;max-width:460px;margin:0 auto;}
  h1{font-family:var(--font-hand);font-size:clamp(22px,6vw,30px);margin:0;
      transform:rotate(-1deg);text-align:center;}
  .sub{font-family:var(--font-hand);font-size:clamp(12px,3.2vw,15px);color:var(--muted);
      margin:0 0 6px 0;text-align:center;}
  .card{display:flex;align-items:center;justify-content:center;width:100%;text-decoration:none;
      color:inherit;background:var(--paper);border:2px solid var(--graphite);border-radius:12px;
      padding:22px 18px;box-shadow:0 8px 20px rgba(60,50,40,.22);transition:transform .1s;
      font-family:var(--font-hand);font-weight:700;font-size:clamp(17px,5vw,21px);
      text-align:center;line-height:1.3;}
  .card:active{transform:scale(.97);}
  .card.blacklist{border-color:var(--ink-red);color:var(--ink-red);}
  .card.game{border-color:var(--ink-blue);color:var(--ink-blue);}
</style>
</head>
<body>
<div id="app">
  <h1>Выбирайте приложение</h1>
  <p class="sub">оба открываются прямо здесь, без установки</p>

  <a class="card blacklist" href="blacklist_index.html">🏴‍☠️ Sanction Black List 📝</a>

  <a class="card game" href="kletka_game.html"># Клетка Game 🎲</a>
</div>
<script>
  try{
    if(window.Telegram && window.Telegram.WebApp){
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }
  }catch(e){}
</script>
</body>
</html>
